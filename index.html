<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Color Match</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #3b82f6;
            --text: #ffffff;
            --text-dim: #71717a;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        /* The Big Circle Preview */
        .preview-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 2rem;
        }

        .color-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: background-color 0.1s ease;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            display: flex;
            overflow: hidden;
        }

        .half-circle {
            width: 50%;
            height: 100%;
            transition: background-color 0.3s ease;
        }

        #target-half { display: none; } /* Hidden until submission */

        /* Sliders */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--text);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--text);
            color: black;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #score-popup {
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 1rem;
            min-height: 2rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <span>ROUND <span id="round-num">1</span>/5</span>
        <span>TOTAL <span id="total-score">0.0</span></span>
    </div>

    <div class="preview-container">
        <div class="color-circle" id="main-circle">
            <div id="target-half" class="half-circle"></div>
            <div id="user-half" class="half-circle" style="width: 100%;"></div>
        </div>
    </div>

    <div id="play-ui">
        <div class="controls">
            <div class="control-group">
                <div class="label-row"><span>Hue</span><span id="v-hue">180</span></div>
                <input type="range" id="hue" min="0" max="360" value="180">
            </div>
            <div class="control-group">
                <div class="label-row"><span>Saturation</span><span id="v-sat">50</span></div>
                <input type="range" id="sat" min="0" max="100" value="50">
            </div>
            <div class="control-group">
                <div class="label-row"><span>Lightness</span><span id="v-light">50</span></div>
                <input type="range" id="light" min="0" max="100" value="50">
            </div>
        </div>

        <button id="main-btn">SUBMIT MATCH</button>
        <div id="score-popup"></div>
    </div>

    <div id="results-ui" class="hidden">
        <h2 id="final-msg">GAME OVER</h2>
        <button onclick="resetGame()">PLAY AGAIN</button>
    </div>
</div>

<script>
    let round = 1;
    let totalScore = 0;
    let target = { h: 0, s: 0, l: 0 };
    
    const userHalf = document.getElementById('user-half');
    const targetHalf = document.getElementById('target-half');
    const mainBtn = document.getElementById('main-btn');
    const scorePopup = document.getElementById('score-popup');

    function startRound() {
        if (round > 5) return endGame();

        // 1. Generate Target
        target = {
            h: Math.floor(Math.random() * 360),
            s: Math.floor(Math.random() * 70) + 15,
            l: Math.floor(Math.random() * 60) + 20
        };

        // 2. Flash Target
        targetHalf.style.display = 'none';
        userHalf.style.width = '100%';
        userHalf.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        mainBtn.disabled = true;
        scorePopup.innerText = "MEMORIZE...";

        setTimeout(() => {
            userHalf.style.backgroundColor = '#222'; // Back to neutral
            updateUserColor();
            mainBtn.disabled = false;
            scorePopup.innerText = "";
        }, 2000);
    }

    function updateUserColor() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;
        
        document.getElementById('v-hue').innerText = h;
        document.getElementById('v-sat').innerText = s;
        document.getElementById('v-light').innerText = l;
        
        userHalf.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
    }

    function submitMatch() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;

        // Reveal Target side-by-side
        targetHalf.style.display = 'block';
        targetHalf.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        userHalf.style.width = '50%';

        // Scoring Logic (0-10)
        let hDiff = Math.abs(target.h - h);
        if (hDiff > 180) hDiff = 360 - hDiff;
        const sDiff = Math.abs(target.s - s);
        const lDiff = Math.abs(target.l - l);

        // Weighted error
        const totalErr = (hDiff / 180 * 5) + (sDiff / 100 * 2.5) + (lDiff / 100 * 2.5);
        let roundScore = Math.max(0, 10 - totalErr);
        roundScore = Math.round(roundScore * 10) / 10;

        totalScore += roundScore;
        scorePopup.innerText = `+${roundScore.toFixed(1)}`;
        
        mainBtn.innerText = "NEXT ROUND";
        mainBtn.onclick = nextRound;
    }

    function nextRound() {
        round++;
        if (round > 5) return endGame();
        
        document.getElementById('round-num').innerText = round;
        document.getElementById('total-score').innerText = totalScore.toFixed(1);
        mainBtn.innerText = "SUBMIT MATCH";
        mainBtn.onclick = submitMatch;
        startRound();
    }

    function endGame() {
        document.getElementById('play-ui').classList.add('hidden');
        document.getElementById('results-ui').classList.remove('hidden');
        document.getElementById('final-msg').innerText = `FINAL SCORE: ${totalScore.toFixed(1)}/50`;
    }

    function resetGame() {
        round = 1;
        totalScore = 0;
        document.getElementById('round-num').innerText = "1";
        document.getElementById('total-score').innerText = "0.0";
        document.getElementById('play-ui').classList.remove('hidden');
        document.getElementById('results-ui').classList.add('hidden');
        mainBtn.onclick = submitMatch;
        startRound();
    }

    // Input Listeners
    ['hue', 'sat', 'light'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateUserColor);
    });

    mainBtn.onclick = submitMatch;
    startRound();
</script>

</body>
</html>
