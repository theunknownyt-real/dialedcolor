<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Guessing Game</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #bb86fc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        #target-box {
            width: 100%;
            height: 150px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0px 0px 5px rgba(0,0,0,0.5);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2c2c2c;
            color: white;
            font-size: 1rem;
            text-transform: uppercase;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .guess-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease;
        }

        .guess-cell {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .color-preview {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            min-height: 40px;
        }

        .indicator {
            font-weight: bold;
            margin-top: 5px;
        }

        .up { color: #ff4d4d; }
        .down { color: #4d94ff; }
        .correct { color: #4caf50; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hex Guess</h1>
        <p>Guess the color of the box below!</p>
        
        <div id="target-box">?</div>

        <div class="input-group">
            <input type="text" id="guess-input" placeholder="#000000" maxlength="7">
            <button id="submit-btn">Guess</button>
        </div>

        <div id="feedback-area">
            </div>
    </div>

    <script>
        let targetHex = "";
        const targetBox = document.getElementById('target-box');
        const input = document.getElementById('guess-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedbackArea = document.getElementById('feedback-area');

        // Generate random color
        function initGame() {
            const randomColor = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            targetHex = `#${randomColor}`.toUpperCase();
            targetBox.style.backgroundColor = targetHex;
        }

        // Helper to convert hex to RGB
        function hexToRgb(hex) {
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);
            return { r, g, b };
        }

        function handleGuess() {
            let val = input.value.trim();
            if (!val.startsWith('#')) val = '#' + val;
            
            // Basic validation
            if (!/^#[0-9A-F]{6}$/i.test(val)) {
                alert("Please enter a valid 6-digit hex code (e.g., #FFFFFF)");
                return;
            }

            const guessRgb = hexToRgb(val.toUpperCase());
            const targetRgb = hexToRgb(targetHex);
            
            displayGuess(val.toUpperCase(), guessRgb, targetRgb);
            input.value = "";

            if (val.toUpperCase() === targetHex) {
                targetBox.innerText = targetHex;
                alert("You got it!");
                submitBtn.disabled = true;
            }
        }

        function getIndicator(guess, target) {
            if (guess < target) return { symbol: '↑', class: 'up' };
            if (guess > target) return { symbol: '↓', class: 'down' };
            return { symbol: '✓', class: 'correct' };
        }

        function displayGuess(hex, guessRgb, targetRgb) {
            const row = document.createElement('div');
            row.className = 'guess-row';

            const channels = [
                { name: 'R', val: guessRgb.r, target: targetRgb.r },
                { name: 'G', val: guessRgb.g, target: targetRgb.g },
                { name: 'B', val: guessRgb.b, target: targetRgb.b }
            ];

            // Color Preview Cell
            const colorCell = document.createElement('div');
            colorCell.className = 'guess-cell';
            colorCell.innerHTML = `<div class="color-preview" style="background-color: ${hex}"></div><span>${hex}</span>`;
            row.appendChild(colorCell);

            // R, G, B Indicators
            channels.forEach(channel => {
                const ind = getIndicator(channel.val, channel.target);
                const cell = document.createElement('div');
                cell.className = 'guess-cell';
                cell.innerHTML = `
                    <span>${channel.name}: ${channel.val}</span>
                    <span class="indicator ${ind.class}">${ind.symbol}</span>
                `;
                row.appendChild(cell);
            });

            feedbackArea.prepend(row);
        }

        submitBtn.addEventListener('click', handleGuess);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleGuess();
        });

        initGame();
    </script>
</body>
</html>
