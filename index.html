<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basically Dialed</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
            --accent-pitch: #00ff88;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif; overflow: hidden;
        }

        /* --- Screens --- */
        .screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; background: var(--bg);
        }

        #home-screen { display: flex; text-align: center; }
        #game-wrapper { display: none; height: 100vh; width: 100vw; z-index: 10; }

        /* --- UI --- */
        .logo { font-size: 0.7rem; letter-spacing: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .title { font-size: 3.5rem; font-weight: 900; margin: 0 0 40px 0; letter-spacing: -2px; line-height: 0.9; }
        .btn-container { display: flex; gap: 20px; }
        .btn-action {
            background: white; color: black; border: none; padding: 18px 40px;
            font-weight: 800; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.96); }
        .btn-secondary { background: transparent; color: white; border: 1px solid white; }
        .btn-pitch { border-color: var(--accent-pitch); color: var(--accent-pitch); }

        /* --- Sidebar & Sliders --- */
        #sidebar {
            width: 200px; background: var(--panel); display: flex;
            flex-direction: column; justify-content: space-around; align-items: center;
            padding: 40px 0; border-right: 1px solid #222;
        }

        .slider-group { display: flex; flex-direction: row; justify-content: space-around; width: 100%; height: 100%; }
        .slider-wrapper { display: flex; flex-direction: column; align-items: center; height: 100%; width: 60px; }
        .slider-label { font-size: 0.65rem; font-weight: 900; color: var(--text-dim); text-align: center; margin-bottom: 10px; }
        .slider-val { font-size: 0.9rem; font-weight: 900; color: var(--text); margin-top: 10px; }

        input[type=range].vertical {
            -webkit-appearance: none; width: 400px; height: 20px; border-radius: 10px;
            outline: none; transform: rotate(270deg); margin: 180px 0; cursor: pointer;
            border: 1px solid #333; transition: opacity 0.3s;
        }
        input[type=range].vertical:disabled { opacity: 0.2; cursor: not-allowed; }
        input[type=range].vertical::-webkit-slider-thumb {
            -webkit-appearance: none; width: 32px; height: 32px; background: white;
            border: 4px solid black; border-radius: 50%; cursor: pointer;
        }

        #hue { background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); }
        #sat, #light, #freq { background: #222; }

        /* --- Workspace --- */
        #workspace { flex: 1; position: relative; display: flex; background: #000; }
        .half { flex: 1; height: 100%; transition: background-color 0.2s; position: relative; display: flex; align-items: center; justify-content: center; }
        #left-half { background: #000; border-right: 1px solid #111; }
        #right-half { background: #080808; }
        .half-label { position: absolute; bottom: 40px; font-size: 0.7rem; font-weight: 900; color: rgba(255,255,255,0.2); letter-spacing: 2px; }

        #overlay-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
        }
        #countdown-container { position: absolute; top: 30px; right: 40px; text-align: right; }
        #countdown { font-size: 5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        #game-ui { position: absolute; left: 40px; top: 40px; z-index: 150; pointer-events: none; }
        #game-ui * { pointer-events: auto; }
        .info-bar { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 20px; }
        #score-popup { font-size: 6rem; font-weight: 900; margin-top: 10px; }

        /* --- Results --- */
        #results-screen { z-index: 3000; }
        .history-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 40px 0; max-width: 80%; }
        .history-box { width: 90px; height: 110px; position: relative; border-radius: 4px; overflow: hidden; border: 1px solid #333; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 900; padding: 5px; }
        .tri-t { position: absolute; width:100%; height:100%; clip-path: polygon(0 0, 0% 100%, 100% 0); z-index: 1; top: 0; left: 0; }
        .tri-u { position: absolute; width:100%; height:100%; clip-path: polygon(100% 100%, 0% 100%, 100% 0); z-index: 1; top: 0; left: 0; }
        .hz-text { z-index: 2; position: relative; text-shadow: 0 2px 4px black; margin-bottom: 2px; }
        .pts-text { z-index: 2; color: var(--accent-pitch); margin-top: auto; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="home-screen" class="screen">
    <div class="logo">Basically</div>
    <h1 class="title">Dialed.GG</h1>
    <div class="btn-container">
        <button class="btn-action" onclick="initGame('color')">Color Mission</button>
        <button class="btn-action btn-secondary btn-pitch" onclick="initGame('pitch')">Pitch Mission</button>
    </div>
</div>

<div id="game-wrapper">
    <div id="sidebar">
        <div id="color-sliders" class="slider-group">
            <div class="slider-wrapper"><div class="slider-label">HUE</div><input type="range" id="hue" class="vertical" min="0" max="360" value="180"><div class="slider-val" id="val-h">180</div></div>
            <div class="slider-wrapper"><div class="slider-label">SAT</div><input type="range" id="sat" class="vertical" min="0" max="100" value="50"><div class="slider-val" id="val-s">50</div></div>
            <div class="slider-wrapper"><div class="slider-label">LIT</div><input type="range" id="light" class="vertical" min="0" max="100" value="50"><div class="slider-val" id="val-l">50</div></div>
        </div>
        <div id="pitch-sliders" class="slider-group" style="display:none;">
            <div class="slider-wrapper" style="width: 100%;"><div class="slider-label">FREQUENCY</div><input type="range" id="freq" class="vertical" min="200" max="1000" step="0.1" value="440"><div class="slider-val" id="val-f" style="font-size: 1.5rem;">440Hz</div></div>
        </div>
    </div>

    <div id="workspace">
        <div id="overlay-layer">
            <div id="countdown-container">
                <div style="font-size: 0.7rem; font-weight: 800; color: rgba(255,255,255,0.4); letter-spacing: 2px;">MEMORIZE >:)</div>
                <div id="countdown">3.000</div>
            </div>
        </div>
        <div id="left-half" class="half"><div class="half-label">TARGET</div><div id="target-hz" style="font-size: 2rem; font-weight: 900;"></div></div>
        <div id="right-half" class="half"><div class="half-label">YOUR MATCH</div><div id="user-hz" style="font-size: 2rem; font-weight: 900;"></div></div>
        <div id="game-ui">
            <div class="info-bar"><span id="mode-text">COLOR</span> &nbsp; | &nbsp; ROUND <span id="round-num">1</span>/5</div>
            <button id="main-btn" class="btn-action" onclick="submitMatch()">Submit Match</button>
            <div id="score-popup"></div>
        </div>
    </div>
</div>

<div id="results-screen" class="screen">
    <div class="logo">ROUND COMPLETE</div>
    <h1 id="final-total" style="font-size: 8rem; margin: 10px 0;">0.0</h1>
    <div id="history-display" class="history-grid"></div>
    <div class="btn-container">
        <button class="btn-action" onclick="resetGame()">Try Again</button>
        <button class="btn-action btn-secondary" onclick="goHome()">Home</button>
    </div>
</div>

<script>
    let mode = 'color', round = 1, totalScore = 0, history = [], target = {}, gameActive = false;
    let audioCtx, targetOsc, userOsc, targetGain, userGain;

    const leftHalf = document.getElementById('left-half'), rightHalf = document.getElementById('right-half');
    const mainBtn = document.getElementById('main-btn'), scorePopup = document.getElementById('score-popup');
    const targetHzDisplay = document.getElementById('target-hz'), userHzDisplay = document.getElementById('user-hz');
    const allSliders = document.querySelectorAll('input[type=range]');

    function initGame(m) {
        mode = m;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-wrapper').style.display = 'flex';
        document.getElementById('mode-text').innerText = mode.toUpperCase();
        document.getElementById('color-sliders').style.display = (mode === 'color') ? 'flex' : 'none';
        document.getElementById('pitch-sliders').style.display = (mode === 'pitch') ? 'flex' : 'none';
        if (mode === 'pitch' && !audioCtx) setupAudio();
        resetGame();
    }

    function toggleSliders(enabled) {
        allSliders.forEach(s => s.disabled = !enabled);
    }

    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        [targetOsc, targetGain] = createOsc();
        [userOsc, userGain] = createOsc();
    }

    function createOsc() {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination); g.gain.value = 0; o.start();
        return [o, g];
    }

    function startRound() {
        if (round > 5) return;
        gameActive = false;
        toggleSliders(false); 
        
        mainBtn.disabled = true;
        mainBtn.innerText = "SUBMIT MATCH";
        scorePopup.innerText = "";
        leftHalf.style.backgroundColor = '#000';
        targetHzDisplay.innerText = "";
        userHzDisplay.innerText = "";
        
        const overlay = document.getElementById('overlay-layer');
        overlay.style.display = 'block';

        if (mode === 'color') {
            target = { 
                h: Math.floor(Math.random() * 360), 
                s: Math.floor(Math.random() * 80) + 10, 
                l: Math.floor(Math.random() * 60) + 20 
            };
            overlay.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;

            let rH, rS, rL;
            let isTooClose = true;
            while (isTooClose) {
                rH = Math.floor(Math.random() * 360);
                rS = Math.floor(Math.random() * 100);
                rL = Math.floor(Math.random() * 100);
                let hDiff = Math.abs(target.h - rH);
                if (hDiff > 180) hDiff = 360 - hDiff;
                if (hDiff > 60 || Math.abs(target.s - rS) > 40 || Math.abs(target.l - rL) > 40) {
                    isTooClose = false;
                }
            }
            document.getElementById('hue').value = rH;
            document.getElementById('sat').value = rS;
            document.getElementById('light').value = rL;
            document.getElementById('val-h').innerText = rH;
            document.getElementById('val-s').innerText = rS;
            document.getElementById('val-l').innerText = rL;

        } else {
            target = Math.floor(Math.random() * 600) + 250;
            targetOsc.frequency.setValueAtTime(target, audioCtx.currentTime);
            targetGain.gain.setTargetAtTime(0.25, audioCtx.currentTime, 0.05);
            overlay.style.backgroundColor = '#111';

            let rF;
            do {
                rF = (Math.random() * (1000 - 200) + 200).toFixed(1);
            } while (Math.abs(rF - target) < 150);

            document.getElementById('freq').value = rF;
            document.getElementById('val-f').innerText = Math.round(rF) + "Hz";
        }

        let start = Date.now();
        const timer = setInterval(() => {
            let remain = Math.max(0, 3000 - (Date.now() - start));
            document.getElementById('countdown').innerText = (remain / 1000).toFixed(3);
            if (remain <= 0) {
                clearInterval(timer);
                overlay.style.display = 'none';
                if (mode === 'pitch') targetGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                
                mainBtn.disabled = false;
                gameActive = true;
                toggleSliders(true); 
                updateVisuals(); 
            }
        }, 10);
    }

    function updateVisuals() {
        if (mode === 'color') {
            const h = document.getElementById('hue').value, s = document.getElementById('sat').value, l = document.getElementById('light').value;
            document.getElementById('val-h').innerText = h; document.getElementById('val-s').innerText = s; document.getElementById('val-l').innerText = l;
            document.getElementById('sat').style.background = `linear-gradient(to right, hsl(${h}, 0%, ${l}%), hsl(${h}, 100%, ${l}%))`;
            document.getElementById('light').style.background = `linear-gradient(to right, #000, hsl(${h}, ${s}%, 50%), #fff)`;
            rightHalf.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
        } else if (gameActive) {
            const f = document.getElementById('freq').value;
            document.getElementById('val-f').innerText = Math.round(f) + "Hz";
            userOsc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.03);
            userGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05);
        }
    }

    function submitMatch() {
        gameActive = false;
        toggleSliders(false); 
        mainBtn.disabled = true;
        let roundScore = 1.0;

        if (mode === 'color') {
            const h = parseInt(document.getElementById('hue').value);
            const s = parseInt(document.getElementById('sat').value);
            const l = parseInt(document.getElementById('light').value);
            
            leftHalf.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
            
            // Calculate differences
            let hDiff = Math.abs(target.h - h); 
            if (hDiff > 180) hDiff = 360 - hDiff; 
            const sDiff = Math.abs(target.s - s);
            const lDiff = Math.abs(target.l - l);

            // UPDATED BUFFER ZONE: Within 5 units of target gives a perfect 10
            if (hDiff <= 5 && sDiff <= 5 && lDiff <= 5) {
                roundScore = 10;
            } else {
                const err = (hDiff / 180 * 7) + (sDiff / 100 * 2) + (lDiff / 100 * 2);
                roundScore = Math.max(1, 10 - err);
            }

            history.push({ 
                t: `hsl(${target.h}, ${target.s}%, ${target.l}%)`, 
                u: `hsl(${h}, ${s}%, ${l}%)`,
                pts: Math.round(roundScore * 10) / 10
            });
        } else {
            const f = parseFloat(document.getElementById('freq').value);
            const hzDiff = Math.abs(f - target);
            if (hzDiff <= 2) {
                roundScore = 10;
            } else {
                const dist = Math.abs(Math.log2(f / target));
                roundScore = Math.max(1, 10 - (dist * 25));
            }
            
            leftHalf.style.backgroundColor = 'var(--accent-pitch)';
            targetHzDisplay.innerText = target + "Hz";
            userHzDisplay.innerText = Math.round(f) + "Hz";
            history.push({ 
                t: target, 
                u: Math.round(f), 
                pts: Math.round(roundScore * 10) / 10 
            });

            userGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
            targetGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05); 
            setTimeout(() => {
                targetGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                setTimeout(() => {
                    userGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05); 
                    setTimeout(() => {
                        userGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                    }, 1000);
                }, 200);
            }, 1000);
        }

        roundScore = Math.round(roundScore * 10) / 10;
        totalScore += roundScore;
        
        scorePopup.innerText = roundScore.toFixed(1);

        setTimeout(() => {
            mainBtn.disabled = false;
            mainBtn.innerText = (round < 5) ? "CONTINUE" : "SHOW RESULTS";
            mainBtn.onclick = (round < 5) ? nextRound : showResults;
        }, mode === 'pitch' ? 2500 : 1500);
    }

    function nextRound() {
        round++; document.getElementById('round-num').innerText = round;
        mainBtn.onclick = submitMatch; startRound();
    }

    function showResults() {
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('final-total').innerText = totalScore.toFixed(1);
        const display = document.getElementById('history-display');
        display.innerHTML = '';
        history.forEach(item => {
            const box = document.createElement('div'); box.className = 'history-box';
            if (mode === 'color') {
                box.innerHTML = `
                    <div class="tri-t" style="background:${item.t}"></div>
                    <div class="tri-u" style="background:${item.u}"></div>
                    <div class="pts-text">${item.pts.toFixed(1)}</div>`;
            } else {
                box.innerHTML = `
                    <div class="hz-text" style="color:var(--accent-pitch)">T: ${item.t}</div>
                    <div class="hz-text">U: ${item.u}</div>
                    <div class="pts-text">${item.pts.toFixed(1)}</div>`;
            }
            display.appendChild(box);
        });
    }

    function resetGame() {
        round = 1; totalScore = 0; history = [];
        document.getElementById('round-num').innerText = "1";
        document.getElementById('results-screen').style.display = 'none';
        mainBtn.onclick = submitMatch; startRound();
    }

    function goHome() {
        if (audioCtx) { targetGain.gain.value = 0; userGain.gain.value = 0; }
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('game-wrapper').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }

    allSliders.forEach(s => s.addEventListener('input', updateVisuals));
</script>

</body>
</html>
