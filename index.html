<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Match Challenge</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #game-container { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 400px; }
        .color-boxes { display: flex; justify-content: space-around; margin-bottom: 20px; height: 150px; }
        .box { width: 150px; height: 150px; border-radius: 10px; border: 3px solid #444; position: relative; }
        #target-box { background-color: #555; }
        #user-box { background-color: hsl(180, 50%, 50%); }
        .label { margin-top: 5px; font-size: 0.9em; color: #bbb; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
        input[type=range] { width: 100%; cursor: pointer; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-size: 1em; cursor: pointer; transition: 0.2s; }
        button:hover { background: #45a049; }
        #message { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .stats { display: flex; justify-content: space-between; width: 100%; margin-bottom: 20px; color: #888; }
        #final-screen { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <span>Round: <span id="round-num">1</span>/5</span>
        <span>Total: <span id="total-score">0</span>/50</span>
    </div>

    <div id="play-area">
        <div class="color-boxes">
            <div>
                <div id="target-box" class="box"></div>
                <div class="label">Target</div>
            </div>
            <div>
                <div id="user-box" class="box"></div>
                <div class="label">Your Match</div>
            </div>
        </div>

        <div class="controls">
            <label>Color (Hue)</label>
            <input type="range" id="hue" min="0" max="360" value="180">
            <label>Brightness</label>
            <input type="range" id="light" min="0" max="100" value="50">
            <label>Contrast (Saturation)</label>
            <input type="range" id="sat" min="0" max="100" value="50">
        </div>

        <button id="action-btn" onclick="handleSubmit()">Submit Match</button>
        <div id="message">Memorize the color!</div>
    </div>

    <div id="final-screen">
        <h2>Game Over!</h2>
        <h1 id="final-score-display">0/50</h1>
        <button onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    let round = 1;
    let totalScore = 0;
    let targetHSL = { h: 0, s: 0, l: 0 };
    let showingTarget = true;

    const targetBox = document.getElementById('target-box');
    const userBox = document.getElementById('user-box');
    const btn = document.getElementById('action-btn');
    const msg = document.getElementById('message');

    function initRound() {
        if (round > 5) return showFinalResults();
        
        // Generate random target
        targetHSL = {
            h: Math.floor(Math.random() * 361),
            s: Math.floor(Math.random() * 80) + 10,
            l: Math.floor(Math.random() * 60) + 20
        };

        // Show target color
        targetBox.style.backgroundColor = `hsl(${targetHSL.h}, ${targetHSL.s}%, ${targetHSL.l}%)`;
        showingTarget = true;
        btn.disabled = true;
        msg.innerText = "Memorizing...";

        // Hide target after 3 seconds
        setTimeout(() => {
            targetBox.style.backgroundColor = "#555";
            showingTarget = false;
            btn.disabled = false;
            msg.innerText = "Match it!";
        }, 3000);
        
        updateUserBox();
    }

    function updateUserBox() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;
        userBox.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
    }

    // Add listeners to sliders
    ['hue', 'sat', 'light'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateUserBox);
    });

    function handleSubmit() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;

        // Calculate difference (Euclidean-ish distance in HSL space)
        let hDiff = Math.abs(targetHSL.h - h);
        if (hDiff > 180) hDiff = 360 - hDiff; // Hue is circular
        const sDiff = Math.abs(targetHSL.s - s);
        const lDiff = Math.abs(targetHSL.l - l);

        // Normalize error (Max possible error is approx 180 hue, 100 sat, 100 light)
        const totalErr = (hDiff / 180) + (sDiff / 100) + (lDiff / 100);
        let roundScore = Math.max(0, 10 - (totalErr * 3.5)); // 3.5 is a difficulty multiplier
        roundScore = Math.round(roundScore * 10) / 10; // Round to 1 decimal

        totalScore += roundScore;
        
        // Show result
        targetBox.style.backgroundColor = `hsl(${targetHSL.h}, ${targetHSL.s}%, ${targetHSL.l}%)`;
        msg.innerText = `Round Score: ${roundScore.toFixed(1)}/10`;
        
        btn.innerText = "Next Round";
        btn.onclick = nextRound;
    }

    function nextRound() {
        round++;
        document.getElementById('round-num').innerText = Math.min(round, 5);
        document.getElementById('total-score').innerText = totalScore.toFixed(1);
        
        btn.innerText = "Submit Match";
        btn.onclick = handleSubmit;
        initRound();
    }

    function showFinalResults() {
        document.getElementById('play-area').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        document.getElementById('final-score-display').innerText = totalScore.toFixed(1) + "/50";
    }

    function resetGame() {
        round = 1;
        totalScore = 0;
        document.getElementById('round-num').innerText = "1";
        document.getElementById('total-score').innerText = "0";
        document.getElementById('play-area').style.display = 'block';
        document.getElementById('final-screen').style.display = 'none';
        btn.innerText = "Submit Match";
        btn.onclick = handleSubmit;
        initRound();
    }

    // Start first round
    initRound();
</script>

</body>
</html>
