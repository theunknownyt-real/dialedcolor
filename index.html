<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Color Match</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        #game-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar with Dynamic Sliders */
        #sidebar {
            width: 110px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            border-right: 1px solid #222;
            z-index: 100;
        }

        .slider-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
        }

        .slider-label {
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        input[type=range].vertical {
            -webkit-appearance: none;
            width: 12px;
            height: 65%;
            border-radius: 6px;
            outline: none;
            cursor: crosshair;
            border: 1px solid #333;
        }

        /* Thumb Styling */
        input[type=range].vertical::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid black;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Initial Gradients */
        #hue { background: linear-gradient(to bottom, #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000); }

        /* Main Workspace */
        #workspace {
            flex: 1;
            position: relative;
            background: var(--bg);
        }

        #user-half {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: #1a1a1a;
            z-index: 5;
            transition: background-color 0.1s;
        }

        #target-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #countdown {
            font-size: 10rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 10px 40px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        #game-ui {
            position: absolute;
            left: 40px;
            top: 40px;
            z-index: 60;
            pointer-events: none;
        }

        #game-ui * { pointer-events: auto; }

        .round-info {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        #main-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: 800;
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        #main-btn:disabled { opacity: 0; pointer-events: none; }

        #score-popup {
            font-size: 4rem;
            font-weight: 900;
            margin-top: 20px;
        }

        /* End Screen */
        #results-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #050505;
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .results-grid {
            display: flex;
            gap: 15px;
            margin: 40px 0;
        }

        .result-box {
            width: 70px; height: 70px;
            position: relative;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .tri-target {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(0 0, 0% 100%, 100% 0);
        }
        .tri-user {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(100% 100%, 0% 100%, 100% 0);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="sidebar">
        <div class="slider-container">
            <span class="slider-label">HUE <span id="val-h">180</span></span>
            <input type="range" id="hue" class="vertical" min="0" max="360" value="180">
        </div>
        <div class="slider-container">
            <span class="slider-label">SAT <span id="val-s">50</span></span>
            <input type="range" id="sat" class="vertical" min="0" max="100" value="50">
        </div>
        <div class="slider-container">
            <span class="slider-label">LIT <span id="val-l">50</span></span>
            <input type="range" id="light" class="vertical" min="0" max="100" value="50">
        </div>
    </div>

    <div id="workspace">
        <div id="target-overlay"><div id="countdown">3</div></div>
        <div id="user-half"></div>
        <div id="game-ui">
            <div class="round-info">ROUND <span id="round-num">1</span> / 5 &nbsp; | &nbsp; TOTAL <span id="total-score">0.0</span></div>
            <button id="main-btn">SUBMIT MATCH</button>
            <div id="score-popup"></div>
        </div>
    </div>

    <div id="results-screen">
        <p style="color: var(--text-dim); letter-spacing: 4px; font-size: 0.8rem;">MISSION COMPLETE</p>
        <h1 id="final-total" style="font-size: 6rem; margin: 10px 0;">0.0</h1>
        <div id="results-grid" class="results-grid"></div>
        <button onclick="resetGame()" style="padding: 15px 40px; font-weight: 800; cursor: pointer; background: white; border: none;">RESTART</button>
    </div>
</div>

<script>
    let round = 1;
    let totalScore = 0;
    let target = { h: 0, s: 0, l: 0 };
    let history = [];
    
    const userHalf = document.getElementById('user-half');
    const targetOverlay = document.getElementById('target-overlay');
    const countdown = document.getElementById('countdown');
    const mainBtn = document.getElementById('main-btn');
    const scorePopup = document.getElementById('score-popup');

    function startRound() {
        if (round > 5) return;
        target = {
            h: Math.floor(Math.random() * 360),
            s: Math.floor(Math.random() * 80) + 10,
            l: Math.floor(Math.random() * 60) + 20
        };
        targetOverlay.style.width = '100%';
        targetOverlay.style.display = 'flex';
        targetOverlay.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        mainBtn.disabled = true;
        scorePopup.innerText = "";
        
        let timeLeft = 3;
        countdown.innerText = timeLeft;
        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) countdown.innerText = timeLeft;
            else {
                clearInterval(timer);
                targetOverlay.style.display = 'none';
                mainBtn.disabled = false;
                userHalf.style.backgroundColor = '#1a1a1a';
                updateUI();
            }
        }, 1000);
    }

    function updateUI() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;
        
        document.getElementById('val-h').innerText = h;
        document.getElementById('val-s').innerText = s;
        document.getElementById('val-l').innerText = l;
        
        userHalf.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;

        // Update Slider Visuals (Reversed for Vertical to go bottom-up or top-down)
        // Here we use top-to-bottom gradients to match the vertical feel
        document.getElementById('sat').style.background = `linear-gradient(to bottom, hsl(${h}, 100%, ${l}%), hsl(${h}, 0%, ${l}%))`;
        document.getElementById('light').style.background = `linear-gradient(to bottom, #fff, hsl(${h}, ${s}%, 50%), #000)`;
    }

    function submit() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;

        targetOverlay.style.display = 'flex';
        targetOverlay.style.width = '50%';
        targetOverlay.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        countdown.innerText = "";

        let hDiff = Math.abs(target.h - h);
        if (hDiff > 180) hDiff = 360 - hDiff;
        const sDiff = Math.abs(target.s - s);
        const lDiff = Math.abs(target.l - l);

        const error = (hDiff / 180 * 6) + (sDiff / 100 * 2) + (lDiff / 100 * 2);
        let roundScore = Math.max(0, 10 - error);
        roundScore = Math.round(roundScore * 10) / 10;

        history.push({ target: `hsl(${target.h}, ${target.s}%, ${target.l}%)`, user: `hsl(${h}, ${s}%, ${l}%)` });
        totalScore += roundScore;
        scorePopup.innerText = roundScore.toFixed(1);
        
        mainBtn.innerText = (round < 5) ? "CONTINUE" : "FINISH";
        mainBtn.onclick = (round < 5) ? nextRound : showEnd;
    }

    function nextRound() {
        round++;
        document.getElementById('round-num').innerText = round;
        document.getElementById('total-score').innerText = totalScore.toFixed(1);
        mainBtn.innerText = "SUBMIT MATCH";
        mainBtn.onclick = submit;
        startRound();
    }

    function showEnd() {
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('final-total').innerText = totalScore.toFixed(1);
        const grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 
        history.forEach((item) => {
            const box = document.createElement('div');
            box.className = 'result-box';
            box.innerHTML = `<div class="tri-target" style="background: ${item.target}"></div><div class="tri-user" style="background: ${item.user}"></div>`;
            grid.appendChild(box);
        });
    }

    function resetGame() {
        round = 1; totalScore = 0; history = [];
        document.getElementById('round-num').innerText = "1";
        document.getElementById('total-score').innerText = "0.0";
        document.getElementById('results-screen').style.display = 'none';
        scorePopup.innerText = "";
        mainBtn.onclick = submit;
        mainBtn.innerText = "SUBMIT MATCH";
        startRound();
    }

    ['hue', 'sat', 'light'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateUI);
    });

    mainBtn.onclick = submit;
    startRound();
</script>

</body>
</html>
