<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Color Match</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .preview-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 40px;
        }

        .color-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .half {
            height: 100%;
            transition: background-color 0.1s ease;
        }

        #target-half { width: 0%; display: none; }
        #user-half { width: 100%; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 35px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            outline: none;
            border: 1px solid #333;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border: 2px solid black;
            border-radius: 50%;
            cursor: pointer;
        }

        #hue { background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); }
        
        button {
            width: 100%;
            padding: 18px;
            border-radius: 8px;
            border: none;
            background: white;
            color: black;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        button:disabled { opacity: 0.2; }

        #score-display {
            margin-top: 20px;
            font-size: 1.8rem;
            font-weight: 900;
            height: 40px;
        }

        /* Triangular Result Boxes */
        .results-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 40px 0;
        }

        .result-box {
            width: 60px;
            height: 60px;
            position: relative;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .tri-target {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: polygon(0 0, 0% 100%, 100% 0);
        }

        .tri-user {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            clip-path: polygon(100% 100%, 0% 100%, 100% 0);
        }

        .res-score {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 3px black;
            z-index: 10;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <span>ROUND <span id="round-num">1</span> / 5</span>
        <span>TOTAL: <span id="total-score">0.0</span></span>
    </div>

    <div class="preview-container" id="main-preview">
        <div class="color-circle">
            <div id="target-half" class="half"></div>
            <div id="user-half" class="half"></div>
        </div>
    </div>

    <div id="ui-play">
        <div class="controls">
            <div class="control-group">
                <div class="label-row"><span>Hue</span><span id="v-hue">180</span></div>
                <input type="range" id="hue" min="0" max="360" value="180">
            </div>
            <div class="control-group">
                <div class="label-row"><span>Saturation</span><span id="v-sat">50</span></div>
                <input type="range" id="sat" min="0" max="100" value="50">
            </div>
            <div class="control-group">
                <div class="label-row"><span>Lightness</span><span id="v-light">50</span></div>
                <input type="range" id="light" min="0" max="100" value="50">
            </div>
        </div>
        <button id="main-btn">SUBMIT MATCH</button>
        <div id="score-display"></div>
    </div>

    <div id="ui-results" class="hidden">
        <p style="color: var(--text-dim); font-size: 0.7rem; letter-spacing: 2px; margin: 0;">FINAL PERFORMANCE</p>
        <h1 id="final-total" style="margin: 10px 0 0 0; font-size: 3rem;">0.0</h1>
        
        <div id="results-grid" class="results-grid">
            </div>

        <button onclick="resetGame()">PLAY AGAIN</button>
    </div>
</div>

<script>
    let round = 1;
    let totalScore = 0;
    let target = { h: 0, s: 0, l: 0 };
    let history = [];
    
    const userHalf = document.getElementById('user-half');
    const targetHalf = document.getElementById('target-half');
    const mainBtn = document.getElementById('main-btn');
    const scoreDisplay = document.getElementById('score-display');
    const previewArea = document.getElementById('main-preview');

    function startRound() {
        if (round > 5) return showEnd();

        target = {
            h: Math.floor(Math.random() * 360),
            s: Math.floor(Math.random() * 80) + 10,
            l: Math.floor(Math.random() * 60) + 20
        };

        targetHalf.style.display = 'none';
        userHalf.style.width = '100%';
        userHalf.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        mainBtn.disabled = true;
        scoreDisplay.innerText = "MEMORIZE...";

        setTimeout(() => {
            userHalf.style.backgroundColor = '#1a1a1a';
            updateUI();
            mainBtn.disabled = false;
            scoreDisplay.innerText = "";
        }, 4000); 
    }

    function updateUI() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;
        
        document.getElementById('v-hue').innerText = h;
        document.getElementById('v-sat').innerText = s;
        document.getElementById('v-light').innerText = l;
        
        userHalf.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;

        document.getElementById('sat').style.background = `linear-gradient(to right, hsl(${h}, 0%, ${l}%), hsl(${h}, 100%, ${l}%))`;
        document.getElementById('light').style.background = `linear-gradient(to right, #000, hsl(${h}, ${s}%, 50%), #fff)`;
    }

    function submit() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;

        targetHalf.style.display = 'block';
        targetHalf.style.width = '50%';
        userHalf.style.width = '50%';
        targetHalf.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;

        let hDiff = Math.abs(target.h - h);
        if (hDiff > 180) hDiff = 360 - hDiff;
        const sDiff = Math.abs(target.s - s);
        const lDiff = Math.abs(target.l - l);

        const totalErr = (hDiff / 180 * 6) + (sDiff / 100 * 2) + (lDiff / 100 * 2);
        let roundScore = Math.max(0, 10 - totalErr);
        roundScore = Math.round(roundScore * 10) / 10;

        history.push({
            target: `hsl(${target.h}, ${target.s}%, ${target.l}%)`,
            user: `hsl(${h}, ${s}%, ${l}%)`,
            score: roundScore.toFixed(1)
        });

        totalScore += roundScore;
        scoreDisplay.innerText = roundScore.toFixed(1);
        
        mainBtn.innerText = (round < 5) ? "CONTINUE" : "VIEW RESULTS";
        mainBtn.onclick = (round < 5) ? nextRound : showEnd;
    }

    function nextRound() {
        round++;
        document.getElementById('round-num').innerText = round;
        document.getElementById('total-score').innerText = totalScore.toFixed(1);
        mainBtn.innerText = "SUBMIT MATCH";
        mainBtn.onclick = submit;
        startRound();
    }

    function showEnd() {
        previewArea.classList.add('hidden'); // Make original circle go away
        document.getElementById('ui-play').classList.add('hidden');
        document.getElementById('ui-results').classList.remove('hidden');
        document.getElementById('final-total').innerText = totalScore.toFixed(1);
        
        const grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 

        history.forEach((item) => {
            const box = document.createElement('div');
            box.className = 'result-box';
            box.innerHTML = `
                <div class="tri-target" style="background: ${item.target}"></div>
                <div class="tri-user" style="background: ${item.user}"></div>
                <div class="res-score">${item.score}</div>
            `;
            grid.appendChild(box);
        });
    }

    function resetGame() {
        round = 1;
        totalScore = 0;
        history = [];
        document.getElementById('round-num').innerText = "1";
        document.getElementById('total-score').innerText = "0.0";
        previewArea.classList.remove('hidden');
        document.getElementById('ui-play').classList.remove('hidden');
        document.getElementById('ui-results').classList.add('hidden');
        mainBtn.onclick = submit;
        startRound();
    }

    ['hue', 'sat', 'light'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateUI);
    });

    mainBtn.onclick = submit;
    startRound();
</script>

</body>
</html>
