<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Color Match</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        #game-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar with Large Rotated Sliders */
        #sidebar {
            width: 180px;
            background: var(--panel);
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            border-right: 1px solid #222;
            z-index: 100;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 50px;
        }

        .slider-label {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        input[type=range].modern-vertical {
            -webkit-appearance: none;
            appearance: none;
            width: 450px; 
            height: 20px; 
            border-radius: 10px;
            outline: none;
            transform: rotate(270deg);
            margin: 200px 0; 
            cursor: pointer;
            border: 1px solid #333;
        }

        input[type=range].modern-vertical::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            background: white;
            border: 4px solid black;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        #hue { background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); }

        /* Main Workspace */
        #workspace {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
        }

        #target-half {
            flex: 1;
            height: 100%;
            background: #000;
            transition: background-color 0.2s;
        }
