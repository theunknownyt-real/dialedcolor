<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Color Match</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif; overflow: hidden;
        }

        #game-wrapper { display: flex; height: 100vh; width: 100vw; }

        /* Home Screen */
        #home-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .logo { font-size: 0.7rem; letter-spacing: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .title { font-size: 3.5rem; font-weight: 900; margin: 0 0 40px 0; letter-spacing: -2px; text-align: center; }

        /* Sidebar */
        #sidebar {
            width: 180px; background: var(--panel); display: flex;
            flex-direction: row; justify-content: space-around; align-items: center;
            padding: 0 15px; border-right: 1px solid #222; z-index: 100;
        }

        .slider-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 50px; }
        .slider-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px; text-align: center; }

        input[type=range].modern-vertical {
            -webkit-appearance: none; width: 450px; height: 20px; border-radius: 10px;
            outline: none; transform: rotate(270deg); margin: 200px 0; cursor: pointer; border: 1px solid #333;
        }

        input[type=range].modern-vertical::-webkit-slider-thumb {
            -webkit-appearance: none; width: 32px; height: 32px; background: white;
            border: 4px solid black; border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        #hue { background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); }

        /* Workspace */
        #workspace { flex: 1; position: relative; background: #000; display: flex; }
        #target-half { flex: 1; height: 100%; background: #000; transition: background-color 0.2s; }
        #user-half { flex: 1; height: 100%; background: #111; transition: background-color 0.1s; }

        #target-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: none; }
        #countdown-container { position: absolute; top: 30px; right: 40px; text-align: right; pointer-events: none; }
        #countdown { font-size: 5rem; font-weight: 900; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }

        #game-ui { position: absolute; left: 40px; top: 40px; z-index: 60; pointer-events: none; }
        #game-ui * { pointer-events: auto; }
        .round-info { font-size: 0.75rem; font-weight: 800; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 20px; }

        .btn-action {
            background: white; color: black; border: none; padding: 18px 40px;
            font-weight: 800; border-radius: 4px; cursor: pointer; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; margin: 10px;
        }

        .btn-secondary { background: transparent; color: white; border: 1px solid white; }
        .btn-action:active { transform: scale(0.96); }
        #main-btn:disabled { opacity: 0; }

        #score-popup { font-size: 5rem; font-weight: 900; margin-top: 20px; }

        /* End Screen */
        #results-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050505; z-index: 1000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .results-grid { display: flex; gap: 20px; margin: 40px 0; }
        .result-box { width: 90px; height: 90px; position: relative; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        .tri-target { position: absolute; width: 100%; height: 100%; clip-path: polygon(0 0, 0% 100%, 100% 0); }
        .tri-user { position: absolute; width: 100%; height: 100%; clip-path: polygon(100% 100%, 0% 100%, 100% 0); }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="logo">Chromatic Labs</div>
    <h1 class="title">PRECISION<br>MATCH</h1>
    <button class="btn-action" onclick="startGame()">Start Mission</button>
</div>

<div id="game-wrapper">
    <div id="sidebar">
        <div class="slider-wrapper">
            <div class="slider-label">HUE<br><span id="val-h">180</span></div>
            <input type="range" id="hue" class="modern-vertical" min="0" max="360" value="180">
        </div>
        <div class="slider-wrapper">
            <div class="slider-label">SAT<br><span id="val-s">50</span></div>
            <input type="range" id="sat" class="modern-vertical" min="0" max="100" value="50">
        </div>
        <div class="slider-wrapper">
            <div class="slider-label">LIT<br><span id="val-l">50</span></div>
            <input type="range" id="light" class="modern-vertical" min="0" max="100" value="50">
        </div>
    </div>

    <div id="workspace">
        <div id="target-overlay">
            <div id="countdown-container">
                <div style="font-size: 0.8rem; font-weight: 800; color: rgba(255,255,255,0.6); letter-spacing: 2px;">MEMORIZING</div>
                <div id="countdown">3.000</div>
            </div>
        </div>
        <div id="target-half"></div>
        <div id="user-half"></div>
        <div id="game-ui">
            <div class="round-info">ROUND <span id="round-num">1</span> / 5 &nbsp; | &nbsp; TOTAL <span id="total-score">0.0</span></div>
            <button id="main-btn" class="btn-action">SUBMIT MATCH</button>
            <div id="score-popup"></div>
        </div>
    </div>

    <div id="results-screen">
        <p style="color: var(--text-dim); letter-spacing: 4px; font-size: 0.8rem;">FINAL PERFORMANCE</p>
        <h1 id="final-total" style="font-size: 8rem; margin: 10px 0;">0.0</h1>
        <div id="results-grid" class="results-grid"></div>
        <div style="display: flex;">
            <button class="btn-action" onclick="resetGame()">Play Again</button>
            <button class="btn-action btn-secondary" onclick="goToHome()">Home</button>
        </div>
    </div>
</div>

<script>
    let round = 1;
    let totalScore = 0;
    let target = { h: 0, s: 0, l: 0 };
    let history = [];
    
    const userHalf = document.getElementById('user-half');
    const targetHalf = document.getElementById('target-half');
    const targetOverlay = document.getElementById('target-overlay');
    const mainBtn = document.getElementById('main-btn');

    function startGame() {
        document.getElementById('home-screen').style.display = 'none';
        resetGame();
    }

    function goToHome() {
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }

    function startRound() {
        if (round > 5) return;
        target = { h: Math.floor(Math.random() * 360), s: Math.floor(Math.random() * 80) + 10, l: Math.floor(Math.random() * 60) + 20 };
        targetHalf.style.backgroundColor = '#000'; 
        targetOverlay.style.display = 'block';
        targetOverlay.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        mainBtn.disabled = true;
        document.getElementById('score-popup').innerText = "";
        
        let startTime = Date.now();
        const timer = setInterval(() => {
            let remaining = Math.max(0, 3000 - (Date.now() - startTime));
            document.getElementById('countdown').innerText = (remaining / 1000).toFixed(3);
            if (remaining <= 0) {
                clearInterval(timer);
                targetOverlay.style.display = 'none';
                mainBtn.disabled = false;
                updateUI();
            }
        }, 10);
    }

    function updateUI() {
        const h = document.getElementById('hue').value, s = document.getElementById('sat').value, l = document.getElementById('light').value;
        document.getElementById('val-h').innerText = h;
        document.getElementById('val-s').innerText = s;
        document.getElementById('val-l').innerText = l;
        userHalf.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
        document.getElementById('sat').style.background = `linear-gradient(to right, hsl(${h}, 0%, ${l}%), hsl(${h}, 100%, ${l}%))`;
        document.getElementById('light').style.background = `linear-gradient(to right, #000, hsl(${h}, ${s}%, 50%), #fff)`;
    }

    function submit() {
        const h = document.getElementById('hue').value, s = document.getElementById('sat').value, l = document.getElementById('light').value;
        targetHalf.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        let hDiff = Math.abs(target.h - h);
        if (hDiff > 180) hDiff = 360 - hDiff;
        const error = (hDiff / 180 * 7) + (Math.abs(target.s - s) / 100 * 2) + (Math.abs(target.l - l) / 100 * 2);
        let roundScore = Math.max(1, 10 - error);
        roundScore = Math.round(roundScore * 10) / 10;
        history.push({ target: `hsl(${target.h}, ${target.s}%, ${target.l}%)`, user: `hsl(${h}, ${s}%, ${l}%)` });
        totalScore += roundScore;
        document.getElementById('score-popup').innerText = roundScore.toFixed(1);
        mainBtn.innerText = (round < 5) ? "CONTINUE" : "FINISH";
        mainBtn.onclick = (round < 5) ? nextRound : showEnd;
    }

    function nextRound() {
        round++;
        document.getElementById('round-num').innerText = round;
        document.getElementById('total-score').innerText = totalScore.toFixed(1);
        mainBtn.innerText = "SUBMIT MATCH";
        mainBtn.onclick = submit;
        startRound();
    }

    function showEnd() {
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('final-total').innerText = totalScore.toFixed(1);
        const grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 
        history.forEach((item) => {
            const box = document.createElement('div');
            box.className = 'result-box';
            box.innerHTML = `<div class="tri-target" style="background: ${item.target}"></div><div class="tri-user" style="background: ${item.user}"></div>`;
            grid.appendChild(box);
        });
    }

    function resetGame() {
        round = 1; totalScore = 0; history = [];
        document.getElementById('round-num').innerText = "1";
        document.getElementById('total-score').innerText = "0.0";
        document.getElementById('results-screen').style.display = 'none';
        mainBtn.onclick = submit;
        mainBtn.innerText = "SUBMIT MATCH";
        startRound();
    }

    ['hue', 'sat', 'light'].forEach(id => document.getElementById(id).addEventListener('input', updateUI));
    mainBtn.onclick = submit;
</script>

</body>
</html>
