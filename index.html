<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Color Match</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Layout Container */
        #game-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Left Sidebar Controls */
        #sidebar {
            width: 120px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #222;
            z-index: 100;
            gap: 20px;
        }

        .vertical-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            width: 100%;
            gap: 15px;
        }

        .v-label {
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            transform: rotate(-90deg);
            white-space: nowrap;
            margin-bottom: 20px;
        }

        input[type=range].vertical {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical;
            width: 12px;
            height: 60%;
            background: #333;
            border-radius: 6px;
            outline: none;
        }

        /* Main Workspace */
        #workspace {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #target-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #countdown-text {
            font-size: 8rem;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #user-half {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: #1a1a1a;
            transition: background-color 0.1s;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            padding: 40px;
            pointer-events: none;
        }
        
        #ui-layer * { pointer-events: auto; }

        .header {
            display: flex;
            gap: 40px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        #main-btn {
            width: 200px;
            padding: 15px;
            background: white;
            color: black;
            border: none;
            font-weight: 800;
            border-radius: 4px;
            cursor: pointer;
        }

        #main-btn:disabled { opacity: 0; pointer-events: none; }

        /* Results Screen */
        #results-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .results-grid {
            display: flex;
            gap: 15px;
            margin: 40px 0;
        }

        .result-box {
            width: 80px; height: 80px;
            position: relative;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .tri-target {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(0 0, 0% 100%, 100% 0);
        }
        .tri-user {
            position: absolute; width: 100%; height: 100%;
            clip-path: polygon(100% 100%, 0% 100%, 100% 0);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="sidebar">
        <div class="vertical-group">
            <span class="v-label">Hue: <span id="v-hue">180</span></span>
            <input type="range" id="hue" class="vertical" min="0" max="360" value="180">
        </div>
        <div class="vertical-group">
            <span class="v-label">Sat: <span id="v-sat">50</span></span>
            <input type="range" id="sat" class="vertical" min="0" max="100" value="50">
        </div>
        <div class="vertical-group">
            <span class="v-label">Light: <span id="v-light">50</span></span>
            <input type="range" id="light" class="vertical" min="0" max="100" value="50">
        </div>
    </div>

    <div id="workspace">
        <div id="target-overlay">
            <div id="countdown-text">3</div>
        </div>
        
        <div id="user-half"></div>

        <div id="ui-layer">
            <div class="header">
                <span>ROUND <span id="round-num">1</span>/5</span>
                <span>TOTAL: <span id="total-score">0.0</span></span>
            </div>
            <button id="main-btn">SUBMIT MATCH</button>
            <div id="score-display" style="font-size: 3rem; font-weight: 900; margin-top: 20px;"></div>
        </div>
    </div>

    <div id="results-screen">
        <p style="color: var(--text-dim); letter-spacing: 3px;">FINAL SCORE</p>
        <h1 id="final-total" style="font-size: 5rem; margin: 10px 0;">0.0</h1>
        <div id="results-grid" class="results-grid"></div>
        <button onclick="resetGame()" style="width: 200px; padding: 15px; background: white; border: none; font-weight: 800;">PLAY AGAIN</button>
    </div>
</div>

<script>
    let round = 1;
    let totalScore = 0;
    let target = { h: 0, s: 0, l: 0 };
    let history = [];
    
    const userHalf = document.getElementById('user-half');
    const targetOverlay = document.getElementById('target-overlay');
    const countdownText = document.getElementById('countdown-text');
    const mainBtn = document.getElementById('main-btn');
    const scoreDisplay = document.getElementById('score-display');

    function startRound() {
        if (round > 5) return;

        target = {
            h: Math.floor(Math.random() * 360),
            s: Math.floor(Math.random() * 80) + 10,
            l: Math.floor(Math.random() * 60) + 20
        };

        // Reveal Full Screen Target
        targetOverlay.style.display = 'flex';
        targetOverlay.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        mainBtn.disabled = true;
        
        let count = 3;
        countdownText.innerText = count;
        
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                countdownText.innerText = count;
            } else {
                clearInterval(timer);
                targetOverlay.style.display = 'none';
                mainBtn.disabled = false;
                userHalf.style.backgroundColor = '#1a1a1a';
                updateUI();
            }
        }, 1000);
    }

    function updateUI() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;
        
        document.getElementById('v-hue').innerText = h;
        document.getElementById('v-sat').innerText = s;
        document.getElementById('v-light').innerText = l;
        
        userHalf.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
    }

    function submit() {
        const h = document.getElementById('hue').value;
        const s = document.getElementById('sat').value;
        const l = document.getElementById('light').value;

        // Reveal target on left side for comparison
        targetOverlay.style.display = 'flex';
        targetOverlay.style.width = '50%';
        targetOverlay.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        countdownText.innerText = "";

        let hDiff = Math.abs(target.h - h);
        if (hDiff > 180) hDiff = 360 - hDiff;
        const sDiff = Math.abs(target.s - s);
        const lDiff = Math.abs(target.l - l);

        const totalErr = (hDiff / 180 * 6) + (sDiff / 100 * 2) + (lDiff / 100 * 2);
        let roundScore = Math.max(0, 10 - totalErr);
        roundScore = Math.round(roundScore * 10) / 10;

        history.push({
            target: `hsl(${target.h}, ${target.s}%, ${target.l}%)`,
            user: `hsl(${h}, ${s}%, ${l}%)`,
            score: roundScore.toFixed(1)
        });

        totalScore += roundScore;
        scoreDisplay.innerText = roundScore.toFixed(1);
        
        mainBtn.innerText = (round < 5) ? "CONTINUE" : "VIEW RESULTS";
        mainBtn.onclick = (round < 5) ? nextRound : showEnd;
    }

    function nextRound() {
        round++;
        targetOverlay.style.width = '100%'; // Reset for full screen
        document.getElementById('round-num').innerText = round;
        document.getElementById('total-score').innerText = totalScore.toFixed(1);
        scoreDisplay.innerText = "";
        mainBtn.innerText = "SUBMIT MATCH";
        mainBtn.onclick = submit;
        startRound();
    }

    function showEnd() {
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('final-total').innerText = totalScore.toFixed(1);
        
        const grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 

        history.forEach((item) => {
            const box = document.createElement('div');
            box.className = 'result-box';
            box.innerHTML = `
                <div class="tri-target" style="background: ${item.target}"></div>
                <div class="tri-user" style="background: ${item.user}"></div>
            `;
            grid.appendChild(box);
        });
    }

    function resetGame() {
        round = 1;
        totalScore = 0;
        history = [];
        document.getElementById('round-num').innerText = "1";
        document.getElementById('total-score').innerText = "0.0";
        document.getElementById('results-screen').style.display = 'none';
        targetOverlay.style.width = '100%';
        scoreDisplay.innerText = "";
        mainBtn.onclick = submit;
        startRound();
    }

    ['hue', 'sat', 'light'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateUI);
    });

    mainBtn.onclick = submit;
    startRound();
</script>

</body>
</html>
