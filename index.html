<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromatic & Sonic Precision</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
            --accent-color: #ffffff;
            --accent-pitch: #00ff88;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif; overflow: hidden;
        }

        /* --- Screens --- */
        .screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; background: var(--bg);
        }

        #home-screen { display: flex; text-align: center; }
        
        #game-wrapper { display: none; height: 100vh; width: 100vw; z-index: 10; }

        /* --- UI Elements --- */
        .logo { font-size: 0.7rem; letter-spacing: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .title { font-size: 3.5rem; font-weight: 900; margin: 0 0 40px 0; letter-spacing: -2px; line-height: 0.9; }

        .btn-container { display: flex; gap: 20px; }
        .btn-action {
            background: white; color: black; border: none; padding: 18px 40px;
            font-weight: 800; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s, background 0.2s;
        }
        .btn-action:active { transform: scale(0.96); }
        .btn-action:hover { background: #eee; }
        .btn-secondary { background: transparent; color: white; border: 1px solid white; }
        .btn-pitch { border-color: var(--accent-pitch); color: var(--accent-pitch); }

        /* --- Sidebar & Sliders --- */
        #sidebar {
            width: 200px; background: var(--panel); display: flex;
            flex-direction: column; justify-content: space-around; align-items: center;
            padding: 40px 0; border-right: 1px solid #222;
        }

        .slider-group { display: flex; flex-direction: row; justify-content: space-around; width: 100%; height: 100%; }
        .slider-wrapper { display: flex; flex-direction: column; align-items: center; height: 100%; width: 60px; }
        .slider-label { font-size: 0.65rem; font-weight: 900; color: var(--text-dim); text-align: center; margin-bottom: 10px; }
        .slider-val { font-size: 0.9rem; font-weight: 900; color: var(--text); margin-top: 10px; }

        input[type=range].vertical {
            -webkit-appearance: none; width: 400px; height: 12px; border-radius: 10px;
            outline: none; transform: rotate(270deg); margin: 180px 0; cursor: pointer; background: #222;
        }
        input[type=range].vertical::-webkit-slider-thumb {
            -webkit-appearance: none; width: 30px; height: 30px; background: white;
            border: 4px solid black; border-radius: 50%; cursor: pointer;
        }

        /* --- Workspace --- */
        #workspace { flex: 1; position: relative; display: flex; background: #000; }
        .half { flex: 1; height: 100%; transition: background-color 0.2s; position: relative; }
        #left-half { background: #000; border-right: 1px solid #111; }
        #right-half { background: #080808; }

        #overlay-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
        }
        #countdown-container { position: absolute; top: 30px; right: 40px; text-align: right; }
        #countdown { font-size: 5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        #game-ui { position: absolute; left: 40px; top: 40px; z-index: 150; pointer-events: none; }
        #game-ui * { pointer-events: auto; }
        .info-bar { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 20px; }
        #score-popup { font-size: 6rem; font-weight: 900; margin-top: 10px; }

        /* --- Results --- */
        #results-screen { z-index: 3000; }
        .history-grid { display: flex; gap: 15px; margin: 40px 0; }
        .history-box { width: 60px; height: 60px; position: relative; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="home-screen" class="screen">
    <div class="logo">Chromatic & Sonic Labs</div>
    <h1 class="title">PRECISION<br>MATCH</h1>
    <div class="btn-container">
        <button class="btn-action" onclick="initGame('color')">Color Mission</button>
        <button class="btn-action btn-secondary btn-pitch" onclick="initGame('pitch')">Pitch Mission</button>
    </div>
</div>

<div id="game-wrapper">
    <div id="sidebar">
        <div id="color-sliders" class="slider-group">
            <div class="slider-wrapper">
                <div class="slider-label">HUE</div>
                <input type="range" id="hue" class="vertical" min="0" max="360" value="180">
                <div class="slider-val" id="val-h">180</div>
            </div>
            <div class="slider-wrapper">
                <div class="slider-label">SAT</div>
                <input type="range" id="sat" class="vertical" min="0" max="100" value="50">
                <div class="slider-val" id="val-s">50</div>
            </div>
            <div class="slider-wrapper">
                <div class="slider-label">LIT</div>
                <input type="range" id="light" class="vertical" min="0" max="100" value="50">
                <div class="slider-val" id="val-l">50</div>
            </div>
        </div>

        <div id="pitch-sliders" class="slider-group" style="display:none;">
            <div class="slider-wrapper" style="width: 100%;">
                <div class="slider-label">FREQUENCY</div>
                <input type="range" id="freq" class="vertical" min="200" max="1000" step="0.1" value="440">
                <div class="slider-val" id="val-f" style="font-size: 1.5rem;">440Hz</div>
            </div>
        </div>
    </div>

    <div id="workspace">
        <div id="overlay-layer">
            <div id="countdown-container">
                <div style="font-size: 0.7rem; font-weight: 800; color: rgba(255,255,255,0.4); letter-spacing: 2px;">MEMORIZING</div>
                <div id="countdown">3.000</div>
            </div>
        </div>

        <div id="left-half" class="half"></div>
        <div id="right-half" class="half"></div>

        <div id="game-ui">
            <div class="info-bar"><span id="mode-text">COLOR</span> &nbsp; | &nbsp; ROUND <span id="round-num">1</span>/5 &nbsp; | &nbsp; TOTAL <span id="total-score">0.0</span></div>
            <button id="main-btn" class="btn-action" onclick="submitMatch()">Submit Match</button>
            <div id="score-popup"></div>
        </div>
    </div>
</div>

<div id="results-screen" class="screen">
    <div class="logo" id="result-type">MISSION COMPLETE</div>
    <h1 id="final-total" style="font-size: 8rem; margin: 10px 0;">0.0</h1>
    <div id="history-display" class="history-grid"></div>
    <div class="btn-container">
        <button class="btn-action" onclick="resetGame()">Try Again</button>
        <button class="btn-action btn-secondary" onclick="goHome()">Home</button>
    </div>
</div>

<script>
    let mode = 'color'; // 'color' or 'pitch'
    let round = 1;
    let totalScore = 0;
    let history = [];
    let target = {}; // Stores color {h,s,l} or freq
    let gameActive = false;

    // Audio Context
    let audioCtx, targetOsc, userOsc, targetGain, userGain;

    const leftHalf = document.getElementById('left-half');
    const rightHalf = document.getElementById('right-half');
    const mainBtn = document.getElementById('main-btn');
    const scorePopup = document.getElementById('score-popup');

    function initGame(m) {
        mode = m;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-wrapper').style.display = 'flex';
        document.getElementById('mode-text').innerText = mode.toUpperCase();
        
        // Toggle Sidebar UI
        document.getElementById('color-sliders').style.display = (mode === 'color') ? 'flex' : 'none';
        document.getElementById('pitch-sliders').style.display = (mode === 'pitch') ? 'flex' : 'none';

        if (mode === 'pitch' && !audioCtx) {
            setupAudio();
        }
        
        resetGame();
    }

    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        targetOsc = audioCtx.createOscillator();
        targetGain = audioCtx.createGain();
        targetOsc.connect(targetGain);
        targetGain.connect(audioCtx.destination);
        targetGain.gain.value = 0;
        targetOsc.start();

        userOsc = audioCtx.createOscillator();
        userGain = audioCtx.createGain();
        userOsc.connect(userGain);
        userGain.connect(audioCtx.destination);
        userGain.gain.value = 0;
        userOsc.start();
    }

    function startRound() {
        if (round > 5) return;
        gameActive = false;
        mainBtn.disabled = true;
        mainBtn.innerText = "SUBMIT MATCH";
        scorePopup.innerText = "";
        leftHalf.style.backgroundColor = '#000';
        document.getElementById('overlay-layer').style.display = 'block';

        if (mode === 'color') {
            target = { h: Math.floor(Math.random() * 360), s: Math.floor(Math.random() * 80) + 10, l: Math.floor(Math.random() * 60) + 20 };
            document.getElementById('overlay-layer').style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
        } else {
            target = Math.floor(Math.random() * 600) + 250;
            targetOsc.frequency.setValueAtTime(target, audioCtx.currentTime);
            targetGain.gain.setTargetAtTime(0.25, audioCtx.currentTime, 0.05);
            document.getElementById('overlay-layer').style.backgroundColor = '#111';
        }

        let start = Date.now();
        const timer = setInterval(() => {
            let remain = Math.max(0, 3000 - (Date.now() - start));
            document.getElementById('countdown').innerText = (remain / 1000).toFixed(3);
            if (remain <= 0) {
                clearInterval(timer);
                document.getElementById('overlay-layer').style.display = 'none';
                if (mode === 'pitch') targetGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                mainBtn.disabled = false;
                gameActive = true;
                updateVisuals();
            }
        }, 10);
    }

    function updateVisuals() {
        if (mode === 'color') {
            const h = document.getElementById('hue').value, s = document.getElementById('sat').value, l = document.getElementById('light').value;
            document.getElementById('val-h').innerText = h;
            document.getElementById('val-s').innerText = s;
            document.getElementById('val-l').innerText = l;
            rightHalf.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
        } else {
            if (!gameActive) return;
            const f = document.getElementById('freq').value;
            document.getElementById('val-f').innerText = Math.round(f) + "Hz";
            userOsc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.03);
            userGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05);
        }
    }

    function submitMatch() {
        gameActive = false;
        mainBtn.disabled = true;
        let roundScore = 1.0;

        if (mode === 'color') {
            const h = document.getElementById('hue').value, s = document.getElementById('sat').value, l = document.getElementById('light').value;
            leftHalf.style.backgroundColor = `hsl(${target.h}, ${target.s}%, ${target.l}%)`;
            let hDiff = Math.abs(target.h - h);
            if (hDiff > 180) hDiff = 360 - hDiff;
            const err = (hDiff / 180 * 7) + (Math.abs(target.s - s) / 100 * 2) + (Math.abs(target.l - l) / 100 * 2);
            roundScore = Math.max(1, 10 - err);
        } else {
            const f = document.getElementById('freq').value;
            targetGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05);
            const dist = Math.abs(Math.log2(f / target));
            roundScore = Math.max(1, 10 - (dist * 25));
            leftHalf.style.backgroundColor = 'var(--accent-pitch)';
        }

        roundScore = Math.round(roundScore * 10) / 10;
        totalScore += roundScore;
        scorePopup.innerText = roundScore.toFixed(1);
        document.getElementById('total-score').innerText = totalScore.toFixed(1);

        setTimeout(() => {
            if (mode === 'pitch') {
                targetGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                userGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
            mainBtn.disabled = false;
            mainBtn.innerText = (round < 5) ? "CONTINUE" : "SHOW RESULTS";
            mainBtn.onclick = (round < 5) ? nextRound : showResults;
        }, 1500);
    }

    function nextRound() {
        round++;
        document.getElementById('round-num').innerText = round;
        mainBtn.onclick = submitMatch;
        startRound();
    }

    function showResults() {
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('final-total').innerText = totalScore.toFixed(1);
    }

    function resetGame() {
        round = 1; totalScore = 0; 
        document.getElementById('round-num').innerText = "1";
        document.getElementById('total-score').innerText = "0.0";
        document.getElementById('results-screen').style.display = 'none';
        mainBtn.onclick = submitMatch;
        startRound();
    }

    function goHome() {
        if (audioCtx) {
            targetGain.gain.value = 0;
            userGain.gain.value = 0;
        }
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('game-wrapper').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
    }

    // Input listeners
    ['hue', 'sat', 'light', 'freq'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateVisuals);
    });
</script>

</body>
</html>
