<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Memory Match</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }

        /* The display boxes */
        .color-displays {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .box {
            height: 100px;
            border-radius: 8px;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
        }

        #target-display { background-color: #334155; }
        #user-display { background-color: #000; }

        .label { font-size: 0.7rem; color: #94a3b8; margin-bottom: 5px; }

        /* Sliders */
        .slider-group { margin: 20px 0; }
        .control { margin-bottom: 15px; }
        
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        .r-slider { accent-color: #ef4444; }
        .g-slider { accent-color: #22c55e; }
        .b-slider { accent-color: #3b82f6; }

        .btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn:disabled { background: #475569; cursor: not-allowed; }

        #timer-overlay {
            position: absolute;
            font-size: 2rem;
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .hidden { display: none !important; }
        
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h2>Memory Match</h2>
    
    <div class="color-displays">
        <div>
            <div class="label">TARGET</div>
            <div id="target-display" class="box">
                <div id="timer-overlay">3</div>
            </div>
        </div>
        <div>
            <div class="label">YOUR GUESS</div>
            <div id="user-display" class="box"></div>
        </div>
    </div>

    <div class="slider-group">
        <div class="control">
            <input type="range" id="r-range" class="r-slider" min="0" max="255" value="0">
        </div>
        <div class="control">
            <input type="range" id="g-range" class="g-slider" min="0" max="255" value="0">
        </div>
        <div class="control">
            <input type="range" id="b-range" class="b-slider" min="0" max="255" value="0">
        </div>
    </div>

    <button id="action-btn" class="btn">Start New Round</button>
    <div id="result"></div>
</div>

<script>
    let targetRGB = { r: 0, g: 0, b: 0 };
    let gameState = 'waiting'; // waiting, memorizing, guessing, revealed

    const targetBox = document.getElementById('target-display');
    const userBox = document.getElementById('user-display');
    const timerOverlay = document.getElementById('timer-overlay');
    const actionBtn = document.getElementById('action-btn');
    const resultDiv = document.getElementById('result');

    const sliders = {
        r: document.getElementById('r-range'),
        g: document.getElementById('g-range'),
        b: document.getElementById('b-range')
    };

    function updatePreview() {
        userBox.style.backgroundColor = `rgb(${sliders.r.value}, ${sliders.g.value}, ${sliders.b.value})`;
    }

    function startRound() {
        gameState = 'memorizing';
        resultDiv.innerText = "";
        actionBtn.disabled = true;
        
        // Generate random color
        targetRGB = {
            r: Math.floor(Math.random() * 256),
            g: Math.floor(Math.random() * 256),
            b: Math.floor(Math.random() * 256)
        };

        // Show target
        targetBox.style.backgroundColor = `rgb(${targetRGB.r}, ${targetRGB.g}, ${targetRGB.b})`;
        timerOverlay.classList.remove('hidden');
        
        let timeLeft = 3;
        timerOverlay.innerText = timeLeft;

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                timerOverlay.innerText = timeLeft;
            } else {
                clearInterval(timer);
                hideTarget();
            }
        }, 1000);
    }

    function hideTarget() {
        gameState = 'guessing';
        targetBox.style.backgroundColor = '#334155'; // Reset to neutral
        timerOverlay.classList.add('hidden');
        actionBtn.disabled = false;
        actionBtn.innerText = "Check Result";
    }

    function checkResult() {
        gameState = 'revealed';
        const userR = parseInt(sliders.r.value);
        const userG = parseInt(sliders.g.value);
        const userB = parseInt(sliders.b.value);

        // Calculate accuracy (distance formula)
        const diffR = Math.abs(targetRGB.r - userR);
        const diffG = Math.abs(targetRGB.g - userG);
        const diffB = Math.abs(targetRGB.b - userB);
        const totalDiff = diffR + diffG + diffB;
        
        // 0 diff = 100%, 765 diff = 0%
        const accuracy = Math.max(0, (100 - (totalDiff / 765) * 100)).toFixed(1);

        // Reveal the target color and the hex codes
        targetBox.style.backgroundColor = `rgb(${targetRGB.r}, ${targetRGB.g}, ${targetRGB.b})`;
        targetBox.innerHTML = `<span style="color: white; text-shadow: 1px 1px 2px black;">#${rgbToHex(targetRGB.r, targetRGB.g, targetRGB.b)}</span>`;
        
        resultDiv.innerHTML = `Accuracy: ${accuracy}%<br><small>R:${targetRGB.r} G:${targetRGB.g} B:${targetRGB.b}</small>`;
        actionBtn.innerText = "Play Again";
    }

    function rgbToHex(r, g, b) {
        return [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    actionBtn.addEventListener('click', () => {
        if (gameState === 'waiting' || gameState === 'revealed') {
            targetBox.innerHTML = '<div id="timer-overlay">3</div>';
            startRound();
        } else if (gameState === 'guessing') {
            checkResult();
        }
    });

    Object.values(sliders).forEach(s => s.addEventListener('input', updatePreview));

    // Initialize UI
    updatePreview();
</script>

</body>
</html>
